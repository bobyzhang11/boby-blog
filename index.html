<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人空间</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            primary: '#0071e3',
            bgray: '#f5f5f7',
            tdark: '#1d1d1f',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f5f5f7; }
    .card-hover { transition: all 0.25s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12); }
    .view { display: none; }
    .view.active { display: block; }
    .nav-active { color: #0071e3; font-weight: 600; }
  </style>
</head>
<body class="font-sans text-tdark antialiased">

  <!-- 导航栏 -->
  <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="#home" class="text-xl font-bold tracking-tight">My Space</a>
      <nav class="flex gap-8 text-sm font-medium">
        <a href="#home" class="nav-link hover:text-primary transition">首页</a>
        <a href="#blog" class="nav-link hover:text-primary transition">文章</a>
        <a href="#thoughts" class="nav-link hover:text-primary transition">想法</a>
        <a href="#downloads" class="nav-link hover:text-primary transition">下载</a>
      </nav>
    </div>
  </header>

  <!-- 内容容器 -->
  <main class="max-w-6xl mx-auto px-4 py-12">

    <!-- ===== 首页视图 ===== -->
    <section id="home-view" class="view active">
      <div class="grid md:grid-cols-2 gap-12 items-center mb-24">
        <div>
          <h1 class="text-5xl font-bold leading-tight tracking-tight mb-6">
            想法被看见<br/>知识被分享
          </h1>
          <p class="text-lg text-gray-500 mb-8">
            这里记录着我的思考、收藏的文章，以及一些可能有用的资料。
          </p>
          <a href="#blog" class="inline-block bg-primary text-white px-8 py-3 rounded-full font-medium shadow-md hover:shadow-lg hover:bg-blue-700 transition">
            浏览文章
          </a>
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-8 aspect-square flex items-center justify-center">
          <svg width="160" height="160" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="96" stroke="#0071e3" stroke-width="6" stroke-dasharray="12 12" opacity="0.3"/>
            <circle cx="100" cy="100" r="60" fill="#0071e3" opacity="0.1"/>
            <circle cx="100" cy="100" r="36" fill="#0071e3" opacity="0.4"/>
            <rect x="94" y="60" width="12" height="12" rx="4" fill="#0071e3"/>
            <rect x="70" y="100" width="12" height="12" rx="4" fill="#0071e3"/>
            <rect x="118" y="100" width="12" height="12" rx="4" fill="#0071e3"/>
            <rect x="94" y="128" width="12" height="12" rx="4" fill="#0071e3"/>
          </svg>
        </div>
      </div>
      <!-- 最新动态卡片 -->
      <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl p-8 shadow-sm card-hover">
          <span class="text-xs font-semibold text-primary uppercase tracking-wider">最新文章</span>
          <h3 class="text-xl font-bold mt-2" id="latest-blog-title">如何构建个人知识库</h3>
          <p class="text-gray-500 mt-2 text-sm" id="latest-blog-desc">从信息收集到输出，一套可循环的系统。</p>
          <a href="#blog" class="text-primary font-medium text-sm mt-4 inline-block">阅读更多 →</a>
        </div>
        <div class="bg-white rounded-2xl p-8 shadow-sm card-hover">
          <span class="text-xs font-semibold text-primary uppercase tracking-wider">最近想法</span>
          <h3 class="text-xl font-bold mt-2" id="latest-thought-title">“少即是多”在数字生活中的实践</h3>
          <p class="text-gray-500 mt-2 text-sm" id="latest-thought-desc">2025年，我减少了80%的屏幕时间，收获了什么。</p>
          <a href="#thoughts" class="text-primary font-medium text-sm mt-4 inline-block">查看全部想法 →</a>
        </div>
      </div>
    </section>

    <!-- ===== 文章视图 ===== -->
    <section id="blog-view" class="view">
      <h2 class="text-4xl font-bold mb-2">文章</h2>
      <p class="text-gray-500 mb-10">深度阅读与分享</p>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="blog-list"></div>
    </section>

    <!-- ===== 想法视图 ===== -->
    <section id="thoughts-view" class="view">
      <h2 class="text-4xl font-bold mb-2">闪念</h2>
      <p class="text-gray-500 mb-10">短思考，随时记录</p>
      <div class="space-y-6" id="thoughts-list"></div>
    </section>

    <!-- ===== 下载视图 ===== -->
    <section id="downloads-view" class="view">
      <h2 class="text-4xl font-bold mb-2">资料下载</h2>
      <p class="text-gray-500 mb-10">部分文档、模板及参考资料</p>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" id="downloads-list"></div>
    </section>

  </main>

  <footer class="border-t border-gray-200 mt-20 py-8 text-center text-sm text-gray-400">
    <p>© 2026 My Space. Powered by GitHub Pages.</p>
  </footer>

  <script>
    // ---------- 数据定义 ----------
    const blogPosts = [
      { title: '如何构建个人知识库', date: '2026-05-20', desc: '从信息收集到输出，一套可循环的系统。', slug: 'knowledge-base' },
      { title: '远程工作的效率陷阱', date: '2026-04-15', desc: '自由与自律的平衡，我的三个关键方法。', slug: 'remote-work' },
      { title: '重读《原子习惯》', date: '2026-03-10', desc: '微小改变的复利，如何真正落地。', slug: 'atomic-habits' },
      { title: '设计中的留白哲学', date: '2026-02-01', desc: '从东方美学到现代UI，为什么“少”即是“多”。', slug: 'whitespace-design' }
    ];

    const thoughts = [
      { content: '“少即是多”在数字生活中的实践：2025年我减少了80%的屏幕时间，收获了更多深度工作和真实交流。', date: '2026-05-28' },
      { content: '好的工具应该像空气，感知不到存在。最近在优化自己的笔记流，目标是“无摩擦”。', date: '2026-05-15' },
      { content: '信息焦虑的根源不是信息过载，而是缺乏过滤框架。建立自己的“认知栅栏”至关重要。', date: '2026-05-02' },
      { content: 'AI 辅助写作让我更关注想法本身，而不是措辞。但最终的审美和判断仍需人类把关。', date: '2026-04-20' }
    ];

    const downloads = [
      { name: '产品需求文档模板.docx', file: 'downloads/PRD-template.docx', icon: '📄' },
      { name: '个人年度复盘模板.pdf', file: 'downloads/year-review.pdf', icon: '📊' },
      { name: '设计系统色板指南.pdf', file: 'downloads/color-guide.pdf', icon: '🎨' },
      { name: '阅读笔记模板.word', file: 'downloads/reading-notes.docx', icon: '📝' }
    ];

    // 首页动态更新
    if (blogPosts.length) {
      document.getElementById('latest-blog-title').textContent = blogPosts[0].title;
      document.getElementById('latest-blog-desc').textContent = blogPosts[0].desc;
    }
    if (thoughts.length) {
      document.getElementById('latest-thought-title').textContent = thoughts[0].content.slice(0, 30) + '...';
      document.getElementById('latest-thought-desc').textContent = thoughts[0].date;
    }

    // 渲染文章列表
    const blogContainer = document.getElementById('blog-list');
    blogPosts.forEach(post => {
      blogContainer.innerHTML += `
        <div class="bg-white rounded-2xl p-6 shadow-sm card-hover flex flex-col">
          <span class="text-xs text-gray-400">${post.date}</span>
          <h3 class="text-lg font-semibold mt-2 mb-2">${post.title}</h3>
          <p class="text-gray-500 text-sm flex-1">${post.desc}</p>
          <span class="text-primary text-sm font-medium mt-4 cursor-pointer">阅读全文</span>
        </div>`;
    });

    // 渲染想法列表
    const thoughtsContainer = document.getElementById('thoughts-list');
    thoughts.forEach(t => {
      thoughtsContainer.innerHTML += `
        <div class="bg-white rounded-2xl p-6 shadow-sm card-hover">
          <p class="text-lg leading-relaxed">${t.content}</p>
          <span class="text-xs text-gray-400 mt-3 block">${t.date}</span>
        </div>`;
    });

    // 渲染下载列表
    const downloadsContainer = document.getElementById('downloads-list');
    downloads.forEach(d => {
      downloadsContainer.innerHTML += `
        <a href="${d.file}" class="bg-white rounded-2xl p-6 shadow-sm card-hover flex items-center gap-4 no-underline">
          <span class="text-3xl">${d.icon}</span>
          <div>
            <p class="font-medium text-tdark">${d.name}</p>
            <p class="text-xs text-gray-400">点击下载</p>
          </div>
        </a>`;
    });

    // ---------- 路由控制 ----------
    const views = {
      home: document.getElementById('home-view'),
      blog: document.getElementById('blog-view'),
      thoughts: document.getElementById('thoughts-view'),
      downloads: document.getElementById('downloads-view')
    };
    const navLinks = document.querySelectorAll('.nav-link');

    function setActiveView(hash) {
      const name = hash.replace('#', '') || 'home';
      Object.keys(views).forEach(key => views[key].classList.remove('active'));
      if (views[name]) views[name].classList.add('active');
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        link.classList.toggle('nav-active', href === `#${name}`);
      });
    }

    window.addEventListener('hashchange', () => setActiveView(window.location.hash));
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.location.hash) window.location.hash = '#home';
      setActiveView(window.location.hash);
    });
  </script>
</body>
</html>
