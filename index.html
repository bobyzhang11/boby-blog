<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-balance {
                text-wrap: balance;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1 hover:border-primary-200 dark:hover:border-primary-800;
            }
            .bg-blur {
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 50%, #f8fafc 100%);
            }
            .dark .gradient-bg {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            }
            .editor-textarea {
                @apply w-full h-full bg-transparent resize-none focus:outline-none font-mono text-sm leading-relaxed;
            }
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-500 min-h-screen flex flex-col font-sans">
    <!-- 导航栏 -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 bg-blur border-b border-gray-100 dark:border-gray-800">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="#" class="flex items-center space-x-2">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center text-white">
                            <i class="fa fa-code"></i>
                        </div>
                        <span class="font-bold text-xl">我的博客</span>
                    </a>
                </div>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#" class="nav-link font-medium text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">首页</a>
                    <a href="#about" class="nav-link font-medium text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">关于我</a>
                    <a href="#articles" class="nav-link font-medium text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">文章</a>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <i class="fa fa-moon-o dark:hidden text-gray-600"></i>
                        <i class="fa fa-sun-o hidden dark:inline text-gray-300"></i>
                    </button>
                    <button id="admin-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="管理">
                        <i class="fa fa-cog text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <button id="mobile-menu-toggle" class="md:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <i class="fa fa-bars text-gray-600 dark:text-gray-300"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="md:hidden hidden border-t border-gray-100 dark:border-gray-800">
            <div class="container mx-auto px-4 py-3 space-y-3">
                <a href="#" class="block py-2 text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">首页</a>
                <a href="#about" class="block py-2 text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">关于我</a>
                <a href="#articles" class="block py-2 text-gray-600 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">文章</a>
                <button id="mobile-new-post" class="w-full text-left py-2 text-primary-600 dark:text-primary-400 font-medium">
                    <i class="fa fa-plus mr-2"></i>发布新文章
                </button>
            </div>
        </div>
    </header>

    <!-- 搜索模态框 -->
    <div id="search-modal" class="fixed inset-0 z-50 hidden bg-black/40 flex items-start justify-center pt-24 px-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-gray-100 dark:border-gray-700">
            <div class="p-5 border-b border-gray-100 dark:border-gray-700 flex items-center">
                <i class="fa fa-search text-gray-400 mr-4 text-lg"></i>
                <input id="search-input" type="text" placeholder="搜索文章标题或内容..." class="w-full bg-transparent focus:outline-none text-lg">
                <button id="search-close" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <i class="fa fa-times text-gray-500"></i>
                </button>
            </div>
            <div id="search-results" class="max-h-96 overflow-y-auto p-3">
                <div class="text-center py-12 text-gray-500 dark:text-gray-400">
                    <i class="fa fa-search text-4xl mb-4 text-gray-300 dark:text-gray-600"></i>
                    <p>输入关键词开始搜索</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理员认证模态框 -->
    <div id="auth-modal" class="fixed inset-0 z-50 hidden bg-black/40 flex items-center justify-center px-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 dark:border-gray-700">
            <div class="p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center mx-auto mb-4">
                        <i class="fa fa-lock text-2xl text-primary-600 dark:text-primary-400"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">管理员认证</h3>
                    <p class="text-gray-600 dark:text-gray-400">
                        输入你的 GitHub 个人访问令牌以获得发布和编辑文章的权限
                    </p>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">GitHub 个人访问令牌</label>
                    <input id="auth-token" type="password" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-transparent focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                </div>
                <div class="text-sm text-gray-500 dark:text-gray-500 mb-6 bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl">
                    <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" class="text-primary-600 dark:text-primary-400 hover:underline font-medium">
                        如何获取个人访问令牌？
                    </a>
                    <p class="mt-2">请确保令牌具有 <code class="bg-white dark:bg-gray-800 px-2 py-1 rounded text-xs">repo</code> 权限</p>
                </div>
                <div class="flex justify-end space-x-3">
                    <button id="auth-cancel" class="px-6 py-3 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-medium">
                        取消
                    </button>
                    <button id="auth-submit" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl transition-colors font-medium shadow-lg shadow-primary-600/20">
                        验证并登录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 文章编辑器模态框 -->
    <div id="editor-modal" class="fixed inset-0 z-50 hidden bg-black/40 overflow-y-auto">
        <div class="min-h-screen flex items-start justify-center px-4 py-8">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-4xl relative border border-gray-100 dark:border-gray-700">
                <div class="sticky top-0 bg-white dark:bg-gray-800 p-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center z-10 rounded-t-2xl">
                    <h3 id="editor-title" class="text-xl font-bold">发布新文章</h3>
                    <div class="flex items-center space-x-2">
                        <button id="editor-preview-toggle" class="px-4 py-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors font-medium">
                            <i class="fa fa-eye mr-2"></i>预览
                        </button>
                        <button id="editor-close" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <i class="fa fa-times text-gray-500"></i>
                        </button>
                    </div>
                </div>
                
                <div class="p-6">
                    <div class="mb-5">
                        <input id="post-title" type="text" class="w-full px-5 py-4 text-2xl font-bold border border-gray-200 dark:border-gray-700 rounded-xl bg-transparent focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="输入一个吸引人的文章标题">
                    </div>
                    
                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">文章标签（用逗号分隔）</label>
                        <input id="post-tags" type="text" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-transparent focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="技术, JavaScript, Web开发">
                    </div>
                    
                    <div class="border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden" style="height: 550px;">
                        <div id="editor-container" class="h-full">
